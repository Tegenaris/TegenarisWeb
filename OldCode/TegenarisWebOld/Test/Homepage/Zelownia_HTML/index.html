<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" >
        <script type="text/javascript" src="scripts/jquery.js?v=1" ></script>
        <script type="text/javascript" src="scripts/bootstrap.min.js"></script>
        <script type="text/javascript" src="scripts/zagadki.js?v=1" ></script>
        <link rel="stylesheet" type="text/css" href="styles/style.css?v=1" />
        <link rel="stylesheet" type="text/css" href="styles/bootstrap-grid.min.css" />
        <link rel="stylesheet" type="text/css" href="styles/bootstrap-reboot.min.css" />
        <link rel="stylesheet" type="text/css" href="styles/bootstrap.min.css" />
    </head>
    <body>
        <p id="zagadka" class="zagadka">Droga Żelo! Poniżej znajdziesz kilka zagadek, których rozwiązanie wskaże Ci drogę do wiecznej (lub niestety tylko chwilowej) szczęśliwości. Powodzenia!</p>
        <div class="check-answer-container"><!--Container for answer based images-->
            <div class="check-answer hidden" id="error">
                <img src="img/minions_sad.png?v=1" />
            </div>
            <div class="check-answer hidden" id="correct">
                <img src="img/minions.png?v=1" />
            </div>
            <div class="check-answer hidden" id="nagroda">
                <img src="img/youwon.png?v=1" /> 
            </div>
        </div><!--End answer based images-->
        <div id="bottom-container" class="align-bottom"> <!--Container for buttons and input-->
            <input  id="riddle-input" class="cst-wide hidden" type="text" placeholder="odpowiedz">
            <button id="check"        class="btn btn-success" type="button" style="display: none">Sprawdź!</button>
            <button id="start"        class="btn btn-danger"  type="button">Rozpocznij</button>
        </div> <!--End buttons and input-->
    </body>
</html>
